name: monthly
on:
  schedule:
    - cron: "0 14 12 * *"
    - cron: "0 14 19 * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python tests/acceptance.py
      - run: python -m pipeline.run
      - name: Commit ledger, summaries, telemetry
        run: |
          git config user.name "wpr-permit-bot"
          git config user.email "actions@github.com"
          git add data telemetry
          git diff --cached --quiet || git commit -m "Monthly ingest $(date -u +%Y-%m-%d)"
          git push
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - uses: actions/deploy-pages@v4
